name: tocomplete_mobile
description: A comprehensive task and memo management application
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI框架和组件
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # 状态管理
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # 网络请求
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 路由管理
  go_router: ^12.1.1
  
  # 日期时间处理
  intl: ^0.18.1
  
  # 图片处理
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  
  # 地理位置
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  
  # 通知
  flutter_local_notifications: ^16.1.0
  
  # 设备信息
  device_info_plus: ^9.1.0
  package_info_plus: ^4.2.0
  
  # 工具库
  uuid: ^4.1.0
  equatable: ^2.0.5
  
  # 动画
  lottie: ^2.7.0
  
  # 其他
  url_launcher: ^6.2.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # 代码生成
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  
  # 代码分析
  flutter_lints: ^3.0.1
  
  # 测试
  mockito: ^5.4.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700 